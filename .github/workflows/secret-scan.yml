name: Secret Scan

# Слой защиты от утечек секретов в CI — на каждый push и PR.
# Дополняет GitHub-native push protection (которая блокирует уже на git push).
# gitleaks бесплатен для публичных репозиториев.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # вся история — чтобы поймать секрет в любом коммите

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Для публичных репозиториев лицензия не нужна (gitleaks бесплатен).
          GITLEAKS_CONFIG: .gitleaks.toml

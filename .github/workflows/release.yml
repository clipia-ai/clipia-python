name: Release to PyPI

# Trusted Publishing (OIDC) — без долгоживущего токена.
# Срабатывает при публикации GitHub Release. Сборка → publish по короткоживущему
# OIDC-токену, привязанному к этому репо+workflow (настраивается на PyPI как
# trusted publisher; pending publisher: project=clipia, owner=clipia-ai,
# repo=clipia-python, workflow=release.yml).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write # ОБЯЗАТЕЛЬНО для OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Publish to PyPI (OIDC, no token)
        uses: pypa/gh-action-pypi-publish@release/v1
